<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Interactive To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for dynamic icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="todo-app">
        <h1>Pro To-Do List</h1>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task...">
            <button id="addBtn"><i class="fas fa-plus"></i> Add</button>
        </div>

        <div class="controls">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="incomplete">Incomplete</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <div class="sorts">
                <select id="sortSelect">
                    <option value="time-desc">Newest First</option>
                    <option value="time-asc">Oldest First</option>
                    <option value="alpha-asc">A-Z</option>
                    <option value="alpha-desc">Z-A</option>
                </select>
            </div>
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be injected here by MVC Model/View -->
        </ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
